name: Build idftool

on: [push, pull_request]

jobs:
  build-idftool-binaries:
    name: Build idftool for ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-amd64, linux-amd64, macos-arm64]
        include:
          - platform: windows-amd64
            runner: windows-latest
          - platform: linux-amd64
            runner: ubuntu-24.04
          - platform: macos-arm64
            runner: macos-latest
    env:
      DISTPATH: idftool-${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --distpath ./${{ env.DISTPATH }} idftool.spec

      - name: Test binary
        run: ./${{ env.DISTPATH }}/idftool --help

      - name: Archive artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.DISTPATH }}
          path: ${{ env.DISTPATH }}

  create_release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-idftool-binaries
    permissions:
      contents: write
    steps:
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download built binaries
        uses: actions/download-artifact@v5

      - name: Compress and rename binaries
        run: |
          for dir in idftool-*; do
            if [[ "$dir" == idftool-win* ]]; then
              zip -r "idftool-v${{ steps.get_version.outputs.VERSION }}-${dir#idftool-}.zip" "$dir"
            else
              chmod -R u=rwx,g=rx,o=rx "$dir"
              tar -cvzf "idftool-v${{ steps.get_version.outputs.VERSION }}-${dir#idftool-}.tar.gz" "$dir"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Version ${{ steps.get_version.outputs.VERSION }}
          draft: true
          prerelease: false
          files: |
            idftool-v${{ steps.get_version.outputs.VERSION }}-*.zip
            idftool-v${{ steps.get_version.outputs.VERSION }}-*.tar.gz
